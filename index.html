<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>다소미 | 아트라이프 다솜 신청</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#f0f9f4;overflow:hidden}
  body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;display:flex;flex-direction:column;height:100vh;width:100vw}

  /* ── 상단 헤더 ── */
  .fh{background:#fff;border-bottom:2px solid #c8e6d4;padding:14px 20px 10px;flex-shrink:0;text-align:center}
  .badge{display:inline-block;background:#c8e6d4;color:#2e7d55;padding:4px 16px;border-radius:100px;font-size:14px;font-weight:700;margin-bottom:6px}
  .fh h1{font-size:22px;font-weight:900;color:#1a2e24;letter-spacing:-.5px}
  .fh p{font-size:14px;color:#5a7060;margin-top:3px;line-height:1.4}

  /* ── 진행바 ── */
  .pw{background:#fff;padding:8px 20px 6px;border-bottom:1.5px solid #eef4f0;flex-shrink:0}
  .pb{height:8px;background:#d0e8da;border-radius:100px;overflow:hidden}
  .pf{height:100%;background:#4a8c6f;border-radius:100px;transition:width .45s ease}
  .pl{text-align:right;font-size:13px;color:#7a9a85;margin-top:4px}

  /* ── 채팅 영역 ── */
  .cw{flex:1;overflow-y:auto;padding:16px 14px 24px;display:flex;flex-direction:column;gap:14px;background:#f4faf7;-webkit-overflow-scrolling:touch}

  /* ── 다소미 헤더 ── */
  .chd{background:#fff;margin:-16px -14px 4px;padding:14px 18px;border-bottom:1.5px solid #eef4f0;display:flex;align-items:center;gap:12px;flex-shrink:0}
  .cav{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#4a8c6f,#6aab8a);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;box-shadow:0 2px 8px rgba(74,140,111,.3)}
  .chi h4{font-size:18px;font-weight:900;color:#1a2e24}
  .chi p{font-size:13px;color:#7a9a85;margin-top:2px}
  .onl{width:9px;height:9px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:5px}

  /* ── 메시지 ── */
  .msgs{display:flex;flex-direction:column;gap:14px}
  .msg{display:flex;align-items:flex-end;gap:8px;animation:fu .3s ease}
  .msg.u{flex-direction:row-reverse}
  @keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  .mav{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#4a8c6f,#6aab8a);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}

  .bub{max-width:72%;padding:14px 18px;border-radius:20px;font-size:18px;line-height:1.6;white-space:pre-line;word-break:keep-all}
  .bub.b{background:#e8f4ee;color:#1a2e24;border-bottom-left-radius:4px}
  .bub.ub{background:linear-gradient(135deg,#4a8c6f,#5a9e7f);color:#fff;border-bottom-right-radius:4px}

  /* ── 타이핑 ── */
  .typing{display:flex;gap:5px;align-items:center;padding:14px 18px;background:#e8f4ee;border-radius:20px;border-bottom-left-radius:4px;width:fit-content}
  .dot{width:10px;height:10px;background:#6aab8a;border-radius:50%;animation:bn 1.2s infinite}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes bn{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

  /* ── 입력 영역 (하단 고정) ── */
  .ia{background:#fff;border-top:1.5px solid #eef4f0;padding:12px 14px;flex-shrink:0}
  .div{height:0}

  /* ── 선택 버튼 ── */
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{background:#fff;border:2px solid #4a8c6f;color:#4a8c6f;padding:15px 20px;border-radius:14px;font-size:18px;font-weight:700;cursor:pointer;transition:all .18s;font-family:inherit;width:100%;text-align:center;line-height:1.4}
  .opt:active,.opt.sel{background:#4a8c6f;color:#fff}
  .opt:disabled{opacity:.4;cursor:default}

  /* ── 텍스트 입력 ── */
  .ir{display:flex;gap:10px}
  .ci{flex:1;border:2px solid #d0e8da;border-radius:14px;padding:14px 18px;font-size:16px;outline:none;font-family:inherit;color:#1a2e24;background:#f9fdfb;line-height:1.4}
  .ci:focus{border-color:#4a8c6f;background:#fff}
  .sb{background:#4a8c6f;color:#fff;border:none;border-radius:14px;width:52px;height:52px;cursor:pointer;font-size:1.3rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(74,140,111,.3)}
  .sb:active{background:#1a2e24}

  /* ── 요약 카드 ── */
  .sum{background:#f0f9f4;border-radius:16px;padding:16px 18px;font-size:17px;line-height:1.9;color:#1a2e24;border:1.5px solid #c8e6d4}
  .sum strong{display:block;font-size:18px;margin-bottom:8px;color:#2e7d55}

  /* ── 상태 ── */
  .st{text-align:center;font-size:16px;padding:13px 16px;border-radius:12px;font-weight:700;margin-bottom:4px;line-height:1.4}
  .st.ok{background:#dcfce7;color:#166534}
  .st.fail{background:#fee2e2;color:#991b1b}

  .rr{text-align:center}
</style>
</head>
<body>

<!-- 상단 헤더 -->
<div class="fh">
  <div class="badge">🌿 아트라이프 다솜</div>
  <h1>프로그램 신청 & 문의</h1>
  <p>다소미가 단계별로 안내해드릴게요 😊</p>
</div>

<!-- 진행바 -->
<div class="pw">
  <div class="pb"><div class="pf" id="prog" style="width:8%"></div></div>
  <div class="pl" id="pl">1 / 6 단계</div>
</div>

<!-- 채팅 영역 -->
<div class="cw" id="cw">
  <div class="chd">
    <div class="cav">🌿</div>
    <div class="chi">
      <h4>다소미</h4>
      <p><span class="onl"></span>아트라이프 다솜 신청 도우미</p>
    </div>
  </div>
  <div class="msgs" id="msgs"></div>
</div>

<!-- 하단 입력 영역 -->
<div class="ia" id="ia"></div>

<script>
const SHEET_URL='https://script.google.com/macros/s/AKfycbxMw69ZKydT_i8KgDo1IPxxqxa8yZ65X373UG7tzEwIX1qw0yGwKjMzf-YMHi-Yq2tK/exec';
const STEPS=[
  {bot:'안녕하세요! 👋\n저는 아트라이프 다솜의 신청 도우미 다소미예요.\n\n어떤 분야로 문의 또는 신청하시나요?',type:'opts',opts:['프로그램 참여 신청','기관 협력 문의','후원 문의','ESG 파트너십'],key:'type'},
  {bot:'관심 있으신 프로그램을 선택해주세요 🎨',type:'opts',opts:['H.A.T. 예술치유 후원 프로젝트','웰에이징 아트문화','ESG 예술 창작 및 캠페인','치유돌봄 전문인력 양성'],key:'program'},
  {bot:'성함을 입력해주세요 😊',type:'text',ph:'예) 홍길동',key:'name'},
  {bot:'연락 가능한 전화번호 또는 이메일을 입력해주세요.',type:'text',ph:'예) 010-0000-0000',key:'contact'},
  {bot:'소속 기관이나 단체명을 알려주세요.\n개인 신청이시면 "개인"으로 입력해주세요.',type:'text',ph:'예) ○○복지센터 / 개인',key:'org'},
  {bot:'마지막으로, 추가 전달 내용을 자유롭게 입력해주세요.\n없으시면 "없음"을 입력해주세요.',type:'text',ph:'문의 내용을 입력해주세요.',key:'note'}
];

let step=0,ans={};
const msgs=document.getElementById('msgs');
const ia=document.getElementById('ia');
const cw=document.getElementById('cw');

function updProg(){
  const p=Math.round((step/STEPS.length)*88)+8;
  document.getElementById('prog').style.width=p+'%';
  document.getElementById('pl').textContent=`${Math.min(step+1,STEPS.length)} / ${STEPS.length} 단계`;
}

function addBot(txt){
  return new Promise(res=>{
    const tr=document.createElement('div');tr.className='msg';tr.id='typ';
    const av=document.createElement('div');av.className='mav';av.textContent='🌿';
    const t=document.createElement('div');t.className='typing';
    t.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    tr.appendChild(av);tr.appendChild(t);msgs.appendChild(tr);cw.scrollTop=cw.scrollHeight;
    setTimeout(()=>{
      document.getElementById('typ')?.remove();
      const r=document.createElement('div');r.className='msg';
      const a=document.createElement('div');a.className='mav';a.textContent='🌿';
      const b=document.createElement('div');b.className='bub b';b.textContent=txt;
      r.appendChild(a);r.appendChild(b);msgs.appendChild(r);cw.scrollTop=cw.scrollHeight;res();
    },820);
  });
}

function addUser(txt){
  const r=document.createElement('div');r.className='msg u';
  const b=document.createElement('div');b.className='bub ub';b.textContent=txt;
  r.appendChild(b);msgs.appendChild(r);cw.scrollTop=cw.scrollHeight;
}

async function showStep(){
  if(step>=STEPS.length){showDone();return;}
  ia.innerHTML='';updProg();
  const s=STEPS[step];
  await addBot(s.bot);
  if(s.type==='opts'){
    const row=document.createElement('div');row.className='opts';row.style.cssText='padding:4px 0 8px 44px';
    s.opts.forEach(o=>{
      const btn=document.createElement('button');btn.className='opt';btn.textContent=o;
      btn.onclick=()=>{row.querySelectorAll('.opt').forEach(b=>b.disabled=true);btn.classList.add('sel');addUser(o);ans[s.key]=o;step++;row.remove();setTimeout(showStep,350);};
      row.appendChild(btn);
    });
    msgs.appendChild(row);cw.scrollTop=cw.scrollHeight;
    ia.innerHTML='';
  } else {
    const row=document.createElement('div');row.className='ir';
    const inp=document.createElement('input');inp.className='ci';inp.placeholder=s.ph||'';
    const btn=document.createElement('button');btn.className='sb';btn.innerHTML='➤';
    const go=()=>{const v=inp.value.trim();if(!v)return;addUser(v);ans[s.key]=v;ia.innerHTML='';step++;setTimeout(showStep,350);};
    btn.onclick=go;inp.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
    row.appendChild(inp);row.appendChild(btn);ia.appendChild(row);
    setTimeout(()=>inp.focus(),100);
  }
}

async function showDone(){
  ia.innerHTML='';
  document.getElementById('prog').style.width='100%';
  document.getElementById('pl').textContent='완료! 🎉';
  await addBot(`감사합니다, ${ans.name}님! 🌿\n\n신청이 완료되었어요.\n담당자가 ${ans.contact}로 빠르게 연락드릴게요.\n\n아트라이프 다솜과 함께해 주셔서 감사합니다 💚`);
  const r=document.createElement('div');r.className='msg';
  const av=document.createElement('div');av.className='mav';av.textContent='🌿';
  const c=document.createElement('div');c.className='sum';
  c.innerHTML=`<strong>📋 신청 요약</strong>신청 유형: <b>${ans.type}</b><br>관심 프로그램: <b>${ans.program}</b><br>성함: <b>${ans.name}</b><br>연락처: <b>${ans.contact}</b><br>소속: <b>${ans.org}</b><br>문의 내용: <b>${ans.note}</b>`;
  r.appendChild(av);r.appendChild(c);msgs.appendChild(r);cw.scrollTop=cw.scrollHeight;
  sendToSheet();
  const rr=document.createElement('div');rr.className='rr';
  const rb=document.createElement('button');rb.className='opt';rb.style.cssText='margin-top:10px;font-size:17px';rb.textContent='🔄 처음부터 다시 신청하기';
  rb.onclick=()=>{step=0;ans={};msgs.innerHTML='';ia.innerHTML='';document.getElementById('prog').style.width='8%';document.getElementById('pl').textContent='1 / 6 단계';showStep();};
  rr.appendChild(rb);ia.appendChild(rr);
}

function sendToSheet(){
  const params=new URLSearchParams({date:new Date().toLocaleString('ko-KR'),type:ans.type,program:ans.program,name:ans.name,contact:ans.contact,org:ans.org,note:ans.note});
  new Image().src=SHEET_URL+'?'+params.toString();
  const el=document.createElement('div');el.className='st ok';el.textContent='✅ 신청이 완료되었습니다! 담당자가 곧 연락드릴게요.';
  ia.prepend(el);
}

setTimeout(showStep,500);
</script>
</body>
</html>
